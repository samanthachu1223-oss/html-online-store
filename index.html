<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Online Store</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <header>

      <h1>🛍️ Online Store</h1>
      <p>Shop our amazing products!</p>

      <div class="header-right">

        <!-- CART -->
        <div class="cart-icon" onclick="toggleCart()">
          🛒
          <span class="cart-count" id="cartCount">0</span>
        </div>

        <!-- ACCOUNT -->
        <div class="account-wrapper">

          <button class="account-btn" onclick="openAuth()">

            <span id="accountBtnInner">

              <svg class="icon-person"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">

                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>

              </svg>

            </span>

          </button>

          <!-- DROPDOWN -->
          <div class="account-dropdown">

            <div class="dropdown-user">
              <div class="user-name" id="dropdownName">
                Hello!
              </div>

              <div class="user-email" id="dropdownEmail">
              </div>
            </div>

            <div class="dropdown-item" onclick="showOrders()">
              📋 My Orders
            </div>

            <div class="dropdown-item logout" onclick="logout()">
              🚪 Log Out
            </div>

          </div>

        </div>

      </div>

    </header>

    <!-- CATEGORY -->
    <div class="category-tabs" id="categoryTabs"></div>

    <!-- PRODUCTS -->
    <div id="products"></div>

  </div>

  <!-- AUTH -->
  <div class="auth-overlay" id="authOverlay">

    <div class="auth-modal">

      <div class="auth-header">
        <div class="close-auth" onclick="closeAuth()">✕</div>
        <h2 id="authTitle">Login</h2>
      </div>

      <div class="auth-body">

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="authEmail">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="authPassword">
        </div>

        <button class="auth-btn" onclick="submitAuth()">
          Continue
        </button>

        <div class="auth-switch">

          <span id="switchText">
            Don't have an account?
          </span>

          <span onclick="switchMode()" id="switchBtn">
            Register
          </span>

        </div>

      </div>
    </div>
  </div>

  <!-- CART -->
  <div class="cart-sidebar" id="cartSidebar">

    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <div class="close-cart" onclick="toggleCart()">✕</div>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-total" id="cartTotal">
      Total: NT$ 0
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
