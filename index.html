<!-- AUTH MODAL -->

<div class="auth-overlay" id="authOverlay"
onclick="closeAuthOnOverlay(event)">

  <div class="auth-modal">

    <div class="auth-modal-header">

      <h2>👤 Account</h2>

      <span class="auth-close"
      onclick="closeAuth()">✕</span>

    </div>

    <div class="auth-tabs">

      <div class="auth-tab active"
      id="tabLogin"
      onclick="switchAuthTab('login')">

        Login

      </div>

      <div class="auth-tab"
      id="tabRegister"
      onclick="switchAuthTab('register')">

        Register

      </div>

    </div>

    <div class="auth-body">

      <!-- LOGIN -->

      <div class="auth-form active"
      id="formLogin">

        <div class="form-group">

          <label>Email</label>

          <input type="email"
          id="loginEmail"
          placeholder="your@email.com">

        </div>

        <div class="form-group">

          <label>Password</label>

          <input type="password"
          id="loginPassword"
          placeholder="Enter password">

        </div>

        <button class="auth-submit-btn"
        onclick="doLogin()">

          Login

        </button>

        <div class="auth-msg"
        id="loginMsg"></div>

      </div>

      <!-- REGISTER -->

      <div class="auth-form"
      id="formRegister">

        <div class="form-group">

          <label>Email</label>

          <input type="email"
          id="regEmail"
          placeholder="your@email.com">

        </div>

        <div class="form-group">

          <label>Password</label>

          <input type="password"
          id="regPassword"
          placeholder="At least 6 characters">

        </div>

        <div class="form-group">

          <label>Confirm Password</label>

          <input type="password"
          id="regPasswordConfirm"
          placeholder="Repeat password">

        </div>

        <button class="auth-submit-btn"
        onclick="doRegister()">

          Create Account

        </button>

        <div class="auth-msg"
        id="registerMsg"></div>

      </div>

    </div>

  </div>

</div>
