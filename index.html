<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🛍️ Online Store</h1>
    <p>Shop our amazing products!</p>
    <div class="header-right">
      <div class="cart-icon" onclick="toggleCart()">
        🛒<span class="cart-count" id="cartCount">0</span>
      </div>
      <div class="account-wrapper" id="accountWrapper">
        <button class="account-btn" id="accountBtn" onclick="handleAccountClick()">
          <span id="accountBtnIcon">👤</span>
          <span id="accountBtnLabel">Account</span>
        </button>
        <div class="account-dropdown" id="accountDropdown">
          <div class="dropdown-user">
            <div class="user-name" id="dropdownName">Hello!</div>
            <div class="user-email" id="dropdownEmail"></div>
          </div>
          <div class="dropdown-item" onclick="closeDropdown()">📋 My Orders</div>
          <div class="dropdown-item logout" onclick="logout()">🚪 Log Out</div>
        </div>
      </div>
    </div>
  </header>
  <div class="category-tabs" id="categoryTabs"></div>
  <div id="products"></div>
</div>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay" onclick="closeAuthOnOverlay(event)">
  <div class="auth-modal">
    <div class="auth-modal-header">
      <h2>👤 Account</h2>
      <span class="auth-close" onclick="closeAuth()">✕</span>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Login</div>
      <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Register</div>
    </div>
    <div class="auth-body">
      <!-- Login Form -->
      <div class="auth-form active" id="formLogin">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="auth-submit-btn" onclick="doLogin()">Login</button>
        <div class="auth-msg" id="loginMsg"></div>
      </div>
      <!-- Register Form -->
      <div class="auth-form" id="formRegister">
        <div class="form-group">
          <label>Name (optional)</label>
          <input type="text" id="regName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="regPasswordConfirm" placeholder="Repeat password">
        </div>
        <button class="auth-submit-btn" onclick="doRegister()">Create Account</button>
        <div class="auth-msg" id="registerMsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>Shopping Cart</h2>
    <span class="close-cart" onclick="toggleCart()">✕</span>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total" id="cartTotal">Total: NT$ 0</div>
  <button class="checkout-btn" id="checkoutBtn" onclick="showCheckout()">Checkout</button>
  <div class="checkout-form" id="checkoutForm">
    <h3>Enter Your Details</h3>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="customerName" required>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="customerEmail" required>
    </div>
    <button class="submit-order-btn" onclick="submitOrderNow()">Submit Order</button>
    <button class="back-btn" onclick="hideCheckout()">Back to Cart</button>
  </div>
</div>

<!-- Thank You -->
<div class="thank-you-overlay" id="thankYouOverlay"></div>
<div class="thank-you-message" id="thankYouMessage">
  <h2>✅ Thanks for your order!</h2>
  <p>Please pay after you got the items~</p>
  <div class="order-summary" id="orderSummary"></div>
  <button onclick="closeThankYou()">Continue Shopping</button>
</div>

<script src="script.js"></script>
</body>
</html>
